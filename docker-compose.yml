services:
  app:
    build:
      context: ./backend
    container_name: ilja-portfolio-app
    environment:
      PORT: 4173
      DATABASE_URL: jdbc:postgresql://postgres:5432/ilja_portfolio
      DATABASE_USERNAME: portfolio
      DATABASE_PASSWORD: portfolio
      BACKOFFICE_TOKEN: local-dev-token
    ports:
      - "4173:4173"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: ilja-portfolio-postgres
    environment:
      POSTGRES_DB: ilja_portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d ilja_portfolio"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
